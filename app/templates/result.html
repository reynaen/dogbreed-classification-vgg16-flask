<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Prediksi - DogBreedAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #fdf6ec 0%, #f5e6d3 100%); min-height: 100vh; }
        .card-custom { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: none; }
        .navbar-brand { font-weight: 700; color: #a9642c !important; }
        .btn-primary-custom { background-color: #a9642c; border: none; }
        .btn-primary-custom:hover { background-color: #8a4f20; }
        img.preview { max-height: 320px; border-radius: 15px; object-fit: cover; }
        .breed-item { border-radius: 12px; background: #fffaf3; padding: 12px 18px; margin-bottom: 10px; }
        .breed-item.top { background: #f3d9b1; font-weight: 700; }
        .progress { height: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <span class="navbar-brand">🐶 DogBreedAI</span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card card-custom p-4 text-center">
                    <h4 style="color:#a9642c;">Hasil Prediksi</h4>
                    <img src="{{ url_for('static', filename='uploads/' + image_file) }}" class="preview mx-auto my-3" alt="Uploaded dog">

                    <div class="text-start mt-2">
                        {% for r in results %}
                        <div class="breed-item {% if loop.first %}top{% endif %}">
                            <div class="d-flex justify-content-between">
                                <span>{{ loop.index }}. {{ r.breed }}</span>
                                <span>{{ r.confidence }}%</span>
                            </div>
                            <div class="progress mt-2">
                                <div class="progress-bar" style="width: {{ r.confidence }}%; background-color:#a9642c;"></div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>

                    <a href="{{ url_for('index') }}" class="btn btn-primary-custom text-white mt-3">Coba Gambar Lain</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
